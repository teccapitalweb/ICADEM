<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logro desbloqueado — ICADEM</title>
<meta property="og:title" content="¡Un logro profesional desbloqueado en ICADEM!">
<meta property="og:description" content="Capacitación profesional que transforma carreras">
<meta property="og:image" content="https://i.ibb.co/BVJQqb0X/ICADEM.jpg">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg,#eff6ff 0%,#f0f4fb 50%,#fef3d0 100%);
  background-attachment: fixed;
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem;
  color: #0d47a1;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(circle at 15% 10%, rgba(200,150,42,0.08) 0%, transparent 35%),
    radial-gradient(circle at 85% 70%, rgba(21,101,192,0.08) 0%, transparent 35%);
  pointer-events: none;
  z-index: 0;
}
.wrap { max-width: 540px; width: 100%; position: relative; z-index: 1; }
.brand-header { text-align: center; margin-bottom: 2rem; }
.brand-logo {
  width: 68px; height: 68px;
  border-radius: 16px;
  margin: 0 auto .75rem;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(11,37,84,0.2);
  border: 2px solid #c8962a;
}
.brand-logo img { width: 100%; height: 100%; object-fit: cover; }
.brand-name {
  font-weight: 900; font-size: 19px; letter-spacing: .1em; color: #0d47a1;
}
.brand-sub {
  font-size: 10px; color: #64748b; letter-spacing: .2em;
  text-transform: uppercase; margin-top: 3px;
}
.trophy-card {
  background: linear-gradient(135deg,#0b2554 0%,#1565c0 100%);
  border-radius: 26px;
  padding: 2.5rem 1.75rem 1.75rem;
  text-align: center;
  color: #fff;
  box-shadow: 0 28px 72px rgba(11,37,84,0.3);
  position: relative;
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.trophy-card::before {
  content: ''; position: absolute;
  top: -60px; right: -40px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
}
.trophy-card::after {
  content: ''; position: absolute;
  bottom: -80px; left: -60px;
  width: 260px; height: 260px;
  border-radius: 50%;
  background: rgba(200,150,42,0.08);
}
.trophy-inner { position: relative; z-index: 1; }
.ribbon {
  display: inline-block;
  background: linear-gradient(135deg,#c8962a 0%,#e8c96a 100%);
  color: #0b1f4a;
  font-size: 10px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  padding: 7px 18px; border-radius: 20px;
  margin-bottom: 1.5rem;
  box-shadow: 0 4px 12px rgba(200,150,42,0.4);
}
.trophy-icon-wrap {
  width: 120px; height: 120px;
  background: linear-gradient(135deg,#c8962a 0%,#e8c96a 100%);
  border-radius: 50%;
  margin: 0 auto 1.5rem;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 12px 32px rgba(200,150,42,0.5), 0 0 0 6px rgba(255,255,255,0.08);
  animation: glow 2.4s ease-in-out infinite;
}
@keyframes glow {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}
.trophy-icon-wrap svg { width: 64px; height: 64px; color: #fff; }
.achievement-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px; font-weight: 700;
  line-height: 1.1; margin-bottom: .5rem;
}
.achievement-desc {
  font-size: 14px;
  color: rgba(255,255,255,0.8);
  line-height: 1.5;
  margin-bottom: 1.5rem;
}
.user-strip {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 14px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 14px;
}
.avatar {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg,#c8962a 0%,#e8c96a 100%);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 16px;
  color: #0b1f4a;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(200,150,42,0.3);
}
.user-text { flex: 1; text-align: left; }
.user-name { font-size: 14px; font-weight: 700; color: #fff; }
.user-date { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
.cta-card {
  background: #fff;
  border-radius: 22px;
  padding: 2rem 1.5rem;
  text-align: center;
  box-shadow: 0 18px 44px rgba(11,37,84,0.12);
  border: 1px solid rgba(200,150,42,0.15);
  position: relative;
  overflow: hidden;
}
.cta-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg,#c8962a,#e8c96a,#c8962a);
}
.cta-tag {
  display: inline-block;
  font-size: 10px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  color: #c8962a;
  background: #fdf4e3;
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 1rem;
}
.cta-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 700;
  color: #0d47a1;
  margin-bottom: .5rem;
  line-height: 1.2;
}
.cta-sub {
  font-size: 13px;
  color: #64748b;
  line-height: 1.6;
  margin-bottom: 1.5rem;
}
.cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg,#0b2554 0%,#1565c0 100%);
  color: #fff;
  text-decoration: none;
  padding: 14px 32px;
  border-radius: 12px;
  font-size: 14px; font-weight: 700;
  letter-spacing: .04em;
  box-shadow: 0 8px 22px rgba(11,37,84,0.3);
  transition: all .2s;
}
.cta-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 32px rgba(11,37,84,0.4);
}
.cta-btn svg { width: 16px; height: 16px; }
.stats {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  margin-top: 1.5rem;
  padding-top: 1.25rem;
  border-top: 1px solid rgba(0,0,0,0.08);
}
.stat-val {
  font-size: 22px; font-weight: 900;
  color: #0d47a1;
  font-family: 'Cormorant Garamond', serif;
}
.stat-lbl {
  font-size: 10px;
  letter-spacing: .12em; text-transform: uppercase;
  color: #94a3b8; margin-top: 2px; font-weight: 600;
}
.benefits {
  margin-top: 1.25rem;
  padding-top: 1.25rem;
  border-top: 1px solid rgba(0,0,0,0.08);
  text-align: left;
}
.benefits-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: #64748b;
  margin-bottom: .75rem;
  text-align: center;
}
.benefit-item {
  display: flex; align-items: flex-start; gap: 10px;
  margin-bottom: .6rem;
  font-size: 13px; color: #475569;
  line-height: 1.4;
}
.benefit-item svg {
  width: 16px; height: 16px;
  color: #c8962a; flex-shrink: 0;
  margin-top: 2px;
}
.footer-text {
  text-align: center;
  margin-top: 2rem;
  font-size: 11px;
  color: #94a3b8;
  line-height: 1.6;
}
.loading { text-align: center; padding: 4rem 0; color: #64748b; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 480px) {
  .achievement-title { font-size: 28px; }
  .trophy-card { padding: 2rem 1.25rem 1.5rem; }
  .trophy-icon-wrap { width: 100px; height: 100px; }
  .trophy-icon-wrap svg { width: 50px; height: 50px; }
  .cta-title { font-size: 22px; }
}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand-header">
    <div class="brand-logo"><img src="https://i.ibb.co/BVJQqb0X/ICADEM.jpg" alt="ICADEM"></div>
    <div class="brand-name">ICADEM</div>
    <div class="brand-sub">Capacitación profesional</div>
  </div>

  <div id="contenido">
    <div class="loading">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1468b1" stroke-width="2" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" opacity=".2"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>
      <p style="margin-top:12px;font-size:13px">Cargando logro...</p>
    </div>
  </div>

  <div class="footer-text">
    © 2026 ICADEM · Instituto de Capacitación Profesional<br>
    <a href="https://icademx.com" style="color:#1468b1;text-decoration:none;font-weight:600">icademx.com</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzPC1wxbzOYutcECtwYBWTTbo76cqrmdA",
  authDomain: "icadem-vip.firebaseapp.com",
  projectId: "icadem-vip",
  storageBucket: "icadem-vip.firebasestorage.app",
  messagingSenderId: "680720828720",
  appId: "1:680720828720:web:08b1e7b6a3b5e98e21c9d8"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const LOGROS = {
  'primer-triunfo': { nombre:'Primer triunfo', desc:'Completó su primer curso', svg:'<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2z"/>' },
  'en-racha': { nombre:'En racha', desc:'Completó 3 cursos', svg:'<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>' },
  'enfocado': { nombre:'Enfocado', desc:'Completó 5 cursos', svg:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor"/>' },
  'maestro-icadem': { nombre:'Maestro ICADEM', desc:'Completó 10 cursos', svg:'<path d="M12 2L15 8L22 9L17 14L18 21L12 18L6 21L7 14L2 9L9 8L12 2Z"/>' },
  'leyenda-icadem': { nombre:'Leyenda ICADEM', desc:'Completó todos los cursos', svg:'<path d="M6 3h12l4 6-10 13L2 9l4-6zM11 3L8 9l4 13 4-13-3-6M2 9h20"/>' },
  'juridico-pro': { nombre:'Jurídico pro', desc:'3 cursos jurídicos completados', svg:'<path d="M12 3l8 4v5c0 5.5-3.8 10.74-8 12-4.2-1.26-8-6.5-8-12V7l8-4z"/>' },
  'maestro-financiero': { nombre:'Maestro financiero', desc:'3 cursos financieros completados', svg:'<path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>' },
  'lider-nato': { nombre:'Líder nato', desc:'3 cursos de liderazgo completados', svg:'<path d="M3 11l19-9-4 19-5-9-10-1z"/>' },
  'marketero': { nombre:'Marketero', desc:'3 cursos de marketing completados', svg:'<path d="M3 11h3l7-5v12l-7-5H3zM15 8a4 4 0 0 1 0 8"/>' },
  'miembro-fiel': { nombre:'Miembro fiel', desc:'Un mes con ICADEM', svg:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>' },
  'miembro-premium': { nombre:'Miembro premium', desc:'Seis meses con ICADEM', svg:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>' },
  'aprendiz-dedicado': { nombre:'Aprendiz dedicado', desc:'Completó 20 clases', svg:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>' }
};

async function cargar() {
  const params = new URLSearchParams(window.location.search);
  const uid = params.get('u');
  const logroId = params.get('l');
  const contenido = document.getElementById('contenido');

  if (!uid || !logroId || !LOGROS[logroId]) {
    contenido.innerHTML = `
      <div class="cta-card">
        <p class="cta-title">Logro no encontrado</p>
        <p class="cta-sub">El enlace parece incompleto o ya no está disponible.</p>
        <a href="https://icademx.com" class="cta-btn">Visita ICADEM</a>
      </div>`;
    return;
  }

  const logro = LOGROS[logroId];
  let nombreUsuario = 'Un miembro ICADEM';
  let fechaLogro = new Date();
  let totalLogros = 1;
  let totalCursos = 0;
  let totalClases = 0;

  try {
    const memSnap = await getDoc(doc(db, 'membresias', uid));
    if (memSnap.exists()) {
      const data = memSnap.data();
      nombreUsuario = data.nombre || data.displayName || (data.email ? data.email.split('@')[0] : 'Un miembro ICADEM');
      totalLogros = (data.logrosDesbloqueados || []).length;
      totalCursos = data.cursosCompletados || 0;
      totalClases = data.clasesCompletadas || 0;
      if (data.fechaLogros && data.fechaLogros[logroId]?.toDate) {
        fechaLogro = data.fechaLogros[logroId].toDate();
      }
    }
  } catch(e) { console.warn('Error cargando:', e); }

  const iniciales = nombreUsuario.split(' ').map(s => s[0]).slice(0,2).join('').toUpperCase();
  const fechaStr = fechaLogro.toLocaleDateString('es-MX', { day:'numeric', month:'long', year:'numeric' });

  contenido.innerHTML = `
    <div class="trophy-card">
      <div class="trophy-inner">
        <div class="ribbon">🏆 Logro desbloqueado</div>
        <div class="trophy-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${logro.svg}</svg>
        </div>
        <h1 class="achievement-title">${logro.nombre}</h1>
        <p class="achievement-desc">${logro.desc}</p>
        <div class="user-strip">
          <div class="avatar">${iniciales}</div>
          <div class="user-text">
            <div class="user-name">${nombreUsuario}</div>
            <div class="user-date">Obtenido el ${fechaStr}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="cta-card">
      <span class="cta-tag">✨ Únete gratis</span>
      <p class="cta-title">¿Quieres lograr lo mismo?</p>
      <p class="cta-sub">ICADEM es la plataforma de capacitación profesional que está transformando carreras. Únete y comienza a desbloquear tus propios logros.</p>
      <a href="https://icademx.com/registro.html" class="cta-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        Regístrate gratis
      </a>
      <div class="stats">
        <div><div class="stat-val">${totalCursos}</div><div class="stat-lbl">Cursos</div></div>
        <div><div class="stat-val">${totalClases}</div><div class="stat-lbl">Clases</div></div>
        <div><div class="stat-val">${totalLogros}</div><div class="stat-lbl">Logros</div></div>
      </div>
      <div class="benefits">
        <p class="benefits-title">¿Por qué ICADEM?</p>
        <div class="benefit-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span>Cursos en video con expertos de Latinoamérica</span>
        </div>
        <div class="benefit-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span>Certificaciones al completar cada curso</span>
        </div>
        <div class="benefit-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span>Acceso a cursos en vivo y material exclusivo</span>
        </div>
        <div class="benefit-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span>Nuevos cursos desbloqueados cada semana</span>
        </div>
      </div>
    </div>
  `;
}

cargar();
</script>

</body>
</html>

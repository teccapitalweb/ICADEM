<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso VIP — ICADEM</title>
  <link rel="icon" type="image/jpeg" href="assets/logo/logo-icadem.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --base:    #08090b;
      --surface: #0f1115;
      --card:    #13161c;
      --border:  rgba(255,255,255,0.07);
      --border-focus: rgba(255,255,255,0.2);
      --gold:    #c8962a;
      --gold-lt: #e8c96a;
      --blue:    #1a3a6b;
      --blue-lt: #2a5298;
      --text:    #f0ede8;
      --muted:   rgba(240,237,232,0.45);
      --error:   #e05555;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Space Grotesk', system-ui, sans-serif;
    }
    html, body { min-height: 100vh; }
    body {
      background: var(--base);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* TOPBAR */
    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 14px 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar a {
      color: var(--text);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .topbar a:hover { opacity: 1; }
    .topbar-logo {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--gold-lt);
    }

    /* STEPS */
    .steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem 1rem 0;
      flex-shrink: 0;
    }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .step-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0;
    }
    .step.active .step-circle {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(200,150,42,0.08);
    }
    .step.done .step-circle {
      border-color: rgba(200,150,42,0.4);
      background: rgba(200,150,42,0.08);
      color: var(--gold);
    }
    .step-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }
    .step.active .step-label { color: var(--gold); }
    .step-line {
      width: 60px;
      height: 1px;
      background: var(--border);
      margin-bottom: 18px;
      margin: 0 8px 18px;
    }

    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 3rem;
    }

    .auth-box {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.4s ease both;
    }

    .plan-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(200,150,42,0.08);
      border: 1px solid rgba(200,150,42,0.2);
      border-radius: 2px;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.75rem;
    }
    .plan-badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
    }

    .auth-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }
    .auth-subtitle {
      color: var(--muted);
      font-size: 13px;
      font-weight: 300;
      margin-bottom: 2.5rem;
      letter-spacing: 0.01em;
    }

    /* TABS */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab.active {
      color: var(--gold-lt);
      border-bottom-color: var(--gold);
    }

    /* FORM */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 1.25rem;
    }
    .form-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .form-input {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px 16px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-input::placeholder { color: rgba(240,237,232,0.2); }
    .form-input:focus { border-color: var(--border-focus); }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1a3a6b, #2a5298);
      border: none;
      border-radius: 2px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider-or {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.5rem 0;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    .divider-or::before, .divider-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-google:hover {
      border-color: var(--border-focus);
      background: rgba(255,255,255,0.03);
    }
    .google-icon {
      width: 16px; height: 16px;
    }

    .error-msg {
      background: rgba(224,85,85,0.1);
      border: 1px solid rgba(224,85,85,0.3);
      border-radius: 2px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--error);
      margin-bottom: 1rem;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* LOADING OVERLAY */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,9,11,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }
    .loading-overlay.visible { display: flex; }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .loading-text {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .form-panel { display: none; }
    .form-panel.active { display: block; }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="vip.html">&#8592; Planes VIP</a>
    <span class="topbar-logo">ICADEM</span>
  </div>

  <!-- STEPS -->
  <div class="steps">
    <div class="step done">
      <div class="step-circle">&#10003;</div>
      <span class="step-label">Plan</span>
    </div>
    <div class="step-line"></div>
    <div class="step active">
      <div class="step-circle">2</div>
      <span class="step-label">Acceso</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-circle">3</div>
      <span class="step-label">Pago</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-circle">4</div>
      <span class="step-label">Panel</span>
    </div>
  </div>

  <div class="main">
    <div class="auth-box">
      <div class="plan-badge" id="plan-badge">
        <span class="plan-badge-dot"></span>
        <span id="plan-badge-text">Cargando plan...</span>
      </div>

      <h1 class="auth-title">Accede a tu<br>cuenta ICADEM</h1>
      <p class="auth-subtitle">Inicia sesión o crea una cuenta para continuar con tu membresía.</p>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Iniciar sesión</div>
        <div class="tab" onclick="switchTab('registro')">Registrarse</div>
      </div>

      <div id="error-msg" class="error-msg"></div>

      <!-- LOGIN -->
      <div class="form-panel active" id="panel-login">
        <div class="form-group">
          <label class="form-label">Correo electrónico</label>
          <input class="form-input" type="email" id="login-email" placeholder="tu@correo.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input class="form-input" type="password" id="login-pass" placeholder="••••••••" />
        </div>
        <button class="btn-submit" id="btn-login" onclick="loginEmail()">Iniciar sesión</button>

        <div class="divider-or">O</div>

        <button class="btn-google" onclick="loginGoogle()">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continuar con Google
        </button>
      </div>

      <!-- REGISTRO -->
      <div class="form-panel" id="panel-registro">
        <div class="form-group">
          <label class="form-label">Nombre completo</label>
          <input class="form-input" type="text" id="reg-nombre" placeholder="Tu nombre" />
        </div>
        <div class="form-group">
          <label class="form-label">Correo electrónico</label>
          <input class="form-input" type="email" id="reg-email" placeholder="tu@correo.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input class="form-input" type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" />
        </div>
        <button class="btn-submit" id="btn-registro" onclick="registrar()">Crear cuenta</button>

        <div class="divider-or">O</div>

        <button class="btn-google" onclick="loginGoogle()">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continuar con Google
        </button>
      </div>

    </div>
  </div>

  <!-- LOADING -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <p class="loading-text">Verificando acceso...</p>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
             signInWithPopup, GoogleAuthProvider, onAuthStateChanged, updateProfile }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ─── CONFIGURACIÓN FIREBASE ───────────────────────────────────────────────
    // Reemplaza estos valores con los de tu proyecto Firebase
    const firebaseConfig = {
      apiKey:            "AIzaSyBzPC1wxbzOYutcECtwYBWTTbo76cqrmdA",
      authDomain:        "icadem-vip.firebaseapp.com",
      projectId:         "icadem-vip",
      storageBucket:     "icadem-vip.firebasestorage.app",
      messagingSenderId: "12508983783",
      appId:             "1:12508983783:web:b12be6f1fab9bb91fb8d42"
    };
    // ─────────────────────────────────────────────────────────────────────────

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();

    function showLoading(txt) {
      document.getElementById('loading').classList.add('visible');
      document.querySelector('.loading-text').textContent = txt || 'Verificando acceso...';
    }
    function hideLoading() {
      document.getElementById('loading').classList.remove('visible');
    }
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('visible');
    }
    function clearError() {
      document.getElementById('error-msg').classList.remove('visible');
    }

    // Si ya está autenticado, ir directo al checkout
    onAuthStateChanged(auth, user => {
      if (user) {
        window.location.href = 'vip-checkout.html';
      }
    });

    // Exponer funciones al scope global
    window.loginEmail = async function() {
      clearError();
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-pass').value;
      if (!email || !pass) { showError('Completa todos los campos.'); return; }
      showLoading('Iniciando sesión...');
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        window.location.href = 'vip-checkout.html';
      } catch(e) {
        hideLoading();
        const msgs = {
          'auth/user-not-found':  'No existe una cuenta con ese correo.',
          'auth/wrong-password':  'Contraseña incorrecta.',
          'auth/invalid-email':   'Correo no válido.',
          'auth/too-many-requests': 'Demasiados intentos. Intenta más tarde.',
        };
        showError(msgs[e.code] || 'Error al iniciar sesión. Intenta de nuevo.');
      }
    };

    window.registrar = async function() {
      clearError();
      const nombre = document.getElementById('reg-nombre').value.trim();
      const email  = document.getElementById('reg-email').value.trim();
      const pass   = document.getElementById('reg-pass').value;
      if (!nombre || !email || !pass) { showError('Completa todos los campos.'); return; }
      if (pass.length < 6) { showError('La contraseña debe tener al menos 6 caracteres.'); return; }
      showLoading('Creando cuenta...');
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: nombre });
        window.location.href = 'vip-checkout.html';
      } catch(e) {
        hideLoading();
        const msgs = {
          'auth/email-already-in-use': 'Ya existe una cuenta con ese correo.',
          'auth/invalid-email':        'Correo no válido.',
          'auth/weak-password':        'La contraseña es muy débil.',
        };
        showError(msgs[e.code] || 'Error al crear la cuenta. Intenta de nuevo.');
      }
    };

    window.loginGoogle = async function() {
      clearError();
      showLoading('Conectando con Google...');
      try {
        await signInWithPopup(auth, provider);
        window.location.href = 'vip-checkout.html';
      } catch(e) {
        hideLoading();
        if (e.code !== 'auth/popup-closed-by-user') {
          showError('Error con Google. Intenta de nuevo.');
        }
      }
    };
  </script>

  <script>
    // Mostrar plan seleccionado
    const plan = localStorage.getItem('icadem_plan') || 'mensual';
    document.getElementById('plan-badge-text').textContent =
      plan === 'anual' ? 'Plan Anual — $2,400 MXN' : 'Plan Mensual — $250 MXN';

    window.switchTab = function(tab) {
      document.querySelectorAll('.tab').forEach((t,i) => {
        t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'registro' && i === 1));
      });
      document.getElementById('panel-login').classList.toggle('active', tab === 'login');
      document.getElementById('panel-registro').classList.toggle('active', tab === 'registro');
      document.getElementById('error-msg').classList.remove('visible');
    };
  </script>
</body>
</html>
